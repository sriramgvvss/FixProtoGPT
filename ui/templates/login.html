<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>FixProtoGPT — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --gradient-2: linear-gradient(120deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--gradient-2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .auth-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 440px;
            padding: 48px 40px 40px;
            animation: slideUp 0.5s ease-out;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .auth-logo p {
            color: #64748b;
            font-size: 0.85rem;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.82rem;
            color: #475569;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            font-size: 0.92rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .btn-auth {
            border: none;
            border-radius: 12px;
            padding: 13px 20px;
            font-weight: 700;
            font-size: 0.95rem;
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-auth:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.4);
            color: #fff;
        }
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #64748b;
        }
        .auth-toggle a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }
        .auth-toggle a:hover { text-decoration: underline; }
        .alert-auth {
            border-radius: 12px;
            font-size: 0.85rem;
            padding: 10px 16px;
        }
        .input-group-text {
            border-radius: 12px 0 0 12px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-right: none;
            color: #94a3b8;
        }
        .input-group .form-control {
            border-radius: 0 12px 12px 0;
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            z-index: 5;
            padding: 4px;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <h1><i class="fas fa-satellite-dish"></i> FixProtoGPT</h1>
            <p>FIX Protocol AI Assistant</p>
        </div>

        <!-- Error / success message -->
        <div id="authAlert" class="alert alert-auth d-none" role="alert"></div>

        <!-- LOGIN FORM -->
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="loginUsername" placeholder="Enter username" required autocomplete="username">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group position-relative">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-auth" id="loginBtn">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
            <div class="auth-toggle">
                Don't have an account? <a onclick="showRegister()">Create one</a>
            </div>
        </form>

        <!-- REGISTER FORM (hidden by default) -->
        <form id="registerForm" style="display:none;" onsubmit="return handleRegister(event)">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                    <input type="text" class="form-control" id="regFullName" placeholder="John Doe" autocomplete="name">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="regUsername" placeholder="Choose a username" required minlength="3" autocomplete="username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group position-relative">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="regPassword" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-auth" id="registerBtn">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
            <div class="auth-toggle">
                Already have an account? <a onclick="showLogin()">Sign in</a>
            </div>
        </form>
    </div>

    <script>
        function showAlert(msg, type) {
            const el = document.getElementById('authAlert');
            el.className = 'alert alert-auth alert-' + type;
            el.textContent = msg;
            el.classList.remove('d-none');
        }
        function hideAlert() {
            document.getElementById('authAlert').classList.add('d-none');
        }
        function showRegister() {
            hideAlert();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
        function showLogin() {
            hideAlert();
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideAlert();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';

            try {
                const resp = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value.trim(),
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    showAlert('Welcome back, ' + data.user.username + '!', 'success');
                    setTimeout(() => window.location.href = '/', 600);
                } else {
                    showAlert(data.error || 'Login failed', 'danger');
                }
            } catch(err) {
                showAlert('Network error. Please try again.', 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
            }
            return false;
        }

        async function handleRegister(e) {
            e.preventDefault();
            hideAlert();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating account...';

            try {
                const resp = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        full_name: document.getElementById('regFullName').value.trim(),
                        username: document.getElementById('regUsername').value.trim(),
                        email: document.getElementById('regEmail').value.trim(),
                        password: document.getElementById('regPassword').value
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    showAlert('Account created! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/', 600);
                } else {
                    showAlert(data.error || 'Registration failed', 'danger');
                }
            } catch(err) {
                showAlert('Network error. Please try again.', 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
            }
            return false;
        }
    </script>
    {{ source_protection | safe }}
</body>
</html>
